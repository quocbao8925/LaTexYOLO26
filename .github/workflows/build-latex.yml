name: Build LaTeX Document
on: [push]
jobs:
  build_latex:
    runs-on: ubuntu-latest
    
    # Bắt buộc: Cấp quyền cho GitHub Actions được phép ghi (push) vào repo của bạn
    permissions:
      contents: write 
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          
      - name: Auto-commit PDF back to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Tự động cập nhật file PDF mới nhất"
          file_pattern: "*.pdf"
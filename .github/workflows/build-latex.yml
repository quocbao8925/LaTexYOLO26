name: Build LaTeX Document
on: [push]
jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex # Tên file LaTeX chính của bạn
          
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: YOLO26-Report # Tên thư mục chứa file tải về
          path: main.pdf      # Đường dẫn file PDF được tạo ra